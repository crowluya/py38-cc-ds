[pytest]
# pytest configuration for Claude Code Python MVP
# Python 3.8.10 compatible

# 测试发现模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# 输出选项
addopts =
    # 简洁输出
    -v
    # 显示本地变量（失败时）
    -l
    # 显示 print 输出
    -s
    # 覆盖率报告（如果安装了 pytest-cov）
    # --cov=deep_code
    # --cov-report=term-missing

# 标记
markers =
    unit: Unit tests
    integration: Integration tests
    windows7: Windows 7 compatibility tests
    slow: Slow running tests

# Python 3.8.10 兼容性设置
filterwarnings =
    # 忽略特定警告（按需添加）
    # ignore::DeprecationWarning
